gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types text/plain text/css application/json application/javascript application/xml text/xml image/svg+xml;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name suomiwow.vaarattu.tv;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name suomiwow.vaarattu.tv;
    ssl_certificate /etc/letsencrypt/live/suomiwow.vaarattu.tv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suomiwow.vaarattu.tv/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy no-referrer-when-downgrade;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy frontend
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /_next/static/ {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /icons/ {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 404 = @backend_icons;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location @backend_icons {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 404 = @icon_not_found;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location @icon_not_found {
        add_header Cache-Control "no-store, max-age=0" always;
        return 404;
    }

    # Admin trigger endpoints → worker process (heavy computation)
    # These run stats recalculation, cache warming, etc. that would block the API
    location /api/admin/trigger/ {
        proxy_pass http://backend-worker:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Admin triggers can take a long time — don't timeout
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Per-guild heavy operations → worker process
    location ~ ^/api/admin/guilds/[^/]+/(recalculate-stats|update-world-ranks)$ {
        proxy_pass http://backend-worker:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

}
