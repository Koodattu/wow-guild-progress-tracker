services:
  mongo:
    image: mongo:7
    container_name: wow-prog-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: wow-prog-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/wow_guild_tracker
      - NODE_ENV=production
      - WORKER_MODE=api
    # Higher CPU share = OS gives this container priority when CPU is contested
    cpu_shares: 1024
    mem_limit: 1024m
    command: ["node", "--max-old-space-size=384", "dist/index.js"]
    volumes:
      - ./data/images:/app/data/images
      - ./backend/logs:/app/logs
    networks:
      - app-network

  backend-worker:
    build: ./backend
    container_name: wow-prog-backend-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/wow_guild_tracker
      - NODE_ENV=production
      - WORKER_MODE=worker
    # Lower CPU share = OS deprioritizes this when API needs CPU
    # nice -n 15 further lowers kernel scheduling priority
    cpu_shares: 256
    mem_limit: 1024m
    command:
      ["nice", "-n", "15", "node", "--max-old-space-size=512", "dist/index.js"]
    volumes:
      - ./data/images:/app/data/images
      - ./backend/logs:/app/logs
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=https://suomiwow.vaarattu.tv
    container_name: wow-prog-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://suomiwow.vaarattu.tv
      - API_URL=http://backend:3001
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - app-network

  nginx:
    build: ./nginx
    container_name: wow-prog-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/html:/var/www/html
    depends_on:
      - frontend
      - backend
      - backend-worker
    networks:
      - app-network

volumes:
  mongo_data:

networks:
  app-network:
    driver: bridge
