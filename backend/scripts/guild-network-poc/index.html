            ctx.fillStyle = `rgba(251, 191, 36, ${Math.min(0.6, 0.15 + n * 0.03)})`;
            ctx.fill();
          }
        }

        // cross-guild fibers: characters who logged with several guilds in the same tier
        if (view.showFibers && td.secondaries.length) {
          ctx.beginPath();
          const cap = Math.min(td.secondaries.length, 7000);
          for (let i = 0; i < cap; i += 2) {
            const c = td.secondaries[i];
            const g = td.secondaries[i + 1];
            const s = td.slotOf.get(c);
            if (s === undefined) continue;
            ctx.moveTo(td.x[s], td.y[s]);
            ctx.lineTo(F.gx[g], F.gy[g]);
          }
          ctx.strokeStyle = "rgba(148, 163, 184, 0.07)";
          ctx.lineWidth = 0.7 / t.k;
          ctx.stroke();
        }

        // persistent per-character migration lines from the previous tier
        if (view.showTrails && view.tier > 0) {
          const lines = tierTrails(view.tier);
          if (lines.length) {
            const paths = new Map();
            for (const [x0, y0, x1, y1, c] of lines) {
              const cls = M.chars[c].classID;
              let path = paths.get(cls);
              if (!path) paths.set(cls, (path = new Path2D()));
              path.moveTo(x0, y0);
              path.lineTo(x1, y1);
            }
            ctx.globalAlpha = 0.3;
            ctx.lineWidth = 0.9 / Math.sqrt(t.k);
            for (const [cls, path] of paths) {
              ctx.strokeStyle = CLASS_COLORS[cls];
              ctx.stroke(path);
            }
            ctx.globalAlpha = 1;
          }
        }

        // leavers fade out where they last stood
        if (view.trans && view.trans.leavers.length) {
          const alpha = (1 - pe) * 0.5;
          if (alpha > 0.02) {
            const paths = new Map();
            for (const [x, y, c] of view.trans.leavers) {
              const cls = M.chars[c].classID;
              let path = paths.get(cls);
              if (!path) paths.set(cls, (path = new Path2D()));
              path.moveTo(x + 1.8, y);
              path.arc(x, y, 1.8, 0, Math.PI * 2);
            }
            ctx.globalAlpha = alpha;
            for (const [cls, path] of paths) {
              ctx.fillStyle = CLASS_COLORS[cls];
              ctx.fill(path);
            }
            ctx.globalAlpha = 1;
          }
        }

        // migration trails
        if (view.trans && view.trans.trails.length) {
          ctx.lineWidth = 1 / t.k;
          for (const [x0, y0, x1, y1, c] of view.trans.trails) {
            const cx = x0 + (x1 - x0) * pe;
            const cy = y0 + (y1 - y0) * pe;
            ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.lineTo(cx, cy);
            ctx.strokeStyle = CLASS_COLORS[M.chars[c].classID] + "55";
            ctx.stroke();
          }
        }

        // character dots, batched by class × alpha bucket
        const buckets = new Map();
        const trans = view.trans;
        for (let s = 0; s < td.count; s += 1) {
          let x = td.x[s];
          let y = td.y[s];
          let alpha = dotAlpha(td.c[s], td.g[s]);
          if (trans) {
            const px = trans.prevX[s];
            if (Number.isNaN(px)) {
              alpha *= pe; // newcomer fades in
            } else {
              x = px + (x - px) * pe;
              y = trans.prevY[s] + (y - trans.prevY[s]) * pe;
            }
          }
          if (alpha < 0.02) continue;
          const bucket = M.chars[td.c[s]].classID * 16 + Math.min(15, Math.round(alpha * 10));
          let path = buckets.get(bucket);
          if (!path) buckets.set(bucket, (path = new Path2D()));
          const r = 1.7 + Math.min(2.4, Math.sqrt(td.r[s]) * 0.45);
          path.moveTo(x + r, y);
          path.arc(x, y, r, 0, Math.PI * 2);
        }
        for (const [bucket, path] of buckets) {
          ctx.globalAlpha = (bucket % 16) / 10;
          ctx.fillStyle = CLASS_COLORS[Math.floor(bucket / 16)];
          ctx.fill(path);
        }
        ctx.globalAlpha = 1;

        // selected character: career path through the constellation + ring
        if (view.selChar >= 0) drawCareerPath(view.selChar, t);

        // hovered character ring
        if (view.hover && view.hover.kind === "char") {
          const s = view.hover.s;
          ctx.beginPath();
          ctx.arc(td.x[s], td.y[s], 5, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(255,255,255,0.9)";
          ctx.lineWidth = 1.4 / t.k;
          ctx.stroke();
        }

        // guild labels (always shown while the toggle is on)
        if (view.showLabels) drawGuildLabels(t, td.roster);

        // character names once zoomed in far enough to read them
        drawCharLabels(t, td);

        ctx.restore();
      }

      function drawGuildLabels(t, roster) {
        const visibleGuilds = selectedCharacterGuilds();
        ctx.textAlign = "center";
        ctx.textBaseline = "bottom";
        for (const [g, n] of roster) {
          if (visibleGuilds && !visibleGuilds.has(g)) continue;
          const isSel = g === view.selGuild;
          const isHover = view.hover && (view.hover.kind === "guild") && view.hover.g === g;
          const guild = M.guilds[g];
          const label = guildLabel(g);
          const fontPx = clamp(11 / t.k, 4, 200);
          ctx.font = `700 ${fontPx}px Inter, system-ui, sans-serif`;
          const x = F.gx[g];
          const y = F.gy[g] - hullRadius(n) - 3 / t.k;
          ctx.lineWidth = 3 / t.k;
          ctx.strokeStyle = "rgba(5, 7, 17, 0.85)";
          ctx.strokeText(label, x, y);
          ctx.fillStyle = isSel || isHover ? "#fbbf24" : `hsl(${guild.hue} 70% 78%)`;
          ctx.fillText(label, x, y);
        }
      }

      function drawAllGuildLabels(t, at) {
        const visibleGuilds = selectedCharacterGuilds();
        ctx.textAlign = "center";
        ctx.textBaseline = "bottom";
        for (const [g] of at.roster) {
          if (visibleGuilds && !visibleGuilds.has(g)) continue;
          const isSel = g === view.selGuild;
          const isHover = view.hover && view.hover.kind === "guild" && view.hover.g === g;
          const guild = M.guilds[g];
          const label = guildLabel(g);
          const fontPx = clamp(11 / t.k, 4, 200);
          const x = at.gx[g];
          const y = at.gy[g] - hullRadius(allTimeHullN(at, g)) - 3 / t.k;
          ctx.font = `700 ${fontPx}px Inter, system-ui, sans-serif`;
          ctx.lineWidth = 3 / t.k;
          ctx.strokeStyle = "rgba(5, 7, 17, 0.85)";
          ctx.strokeText(label, x, y);
          ctx.fillStyle = isSel || isHover ? "#fbbf24" : `hsl(${guild.hue} 70% 78%)`;
          ctx.fillText(label, x, y);
        }
      }

      function drawCharLabels(t, src, minK = 3.2) {
        if (t.k < minK) return;
        const rect = stage.getBoundingClientRect();
        const wx0 = -t.x / t.k - 20;
        const wy0 = -t.y / t.k - 20;
        const wx1 = (rect.width - t.x) / t.k + 20;
        const wy1 = (rect.height - t.y) / t.k + 20;
        const fontPx = 10 / t.k;
        ctx.font = `600 ${fontPx}px Inter, system-ui, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        for (let s = 0; s < src.count; s += 1) {
          const x = src.x[s];
          const y = src.y[s];
          if (x < wx0 || x > wx1 || y < wy0 || y > wy1) continue;
          const ch = M.chars[src.c[s]];
          const label = characterLabel(src.c[s]);
          ctx.lineWidth = 2.6 / t.k;
          ctx.strokeStyle = "rgba(5, 7, 17, 0.88)";
          ctx.strokeText(label, x, y + 3.4);
          ctx.fillStyle = CLASS_COLORS[ch.classID];
          ctx.fillText(label, x, y + 3.4);
        }
      }

      function drawCareerPath(c, t) {
        const tiersAttended = F.charTiers[c] || [];
        if (!tiersAttended.length) return;
        const points = tiersAttended.map((tt) => {
          const td = F.tiers[tt];
          const s = td.slotOf.get(c);
          return { t: tt, x: td.x[s], y: td.y[s] };
        });

        ctx.lineWidth = 2.4 / Math.sqrt(t.k);
        for (let i = 1; i < points.length; i += 1) {
          const a = points[i - 1];
          const b = points[i];
          const gap = b.t - a.t > 1;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          const mx = (a.x + b.x) / 2 - (b.y - a.y) * 0.1;
          const my = (a.y + b.y) / 2 + (b.x - a.x) * 0.1;
          ctx.quadraticCurveTo(mx, my, b.x, b.y);
          ctx.setLineDash(gap ? [6 / t.k, 6 / t.k] : []);
          const hueShift = 30 + (i / points.length) * 30;
          ctx.strokeStyle = `hsl(${hueShift} 95% 62% / 0.9)`;
          ctx.stroke();
        }
        ctx.setLineDash([]);

        const fontPx = clamp(10 / t.k, 3, 60);
        ctx.font = `700 ${fontPx}px Inter, system-ui, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        for (const point of points) {
          const isCurrent = point.t === view.tier;
          ctx.beginPath();
          ctx.arc(point.x, point.y, (isCurrent ? 5 : 3.4) / Math.sqrt(t.k), 0, Math.PI * 2);
          ctx.fillStyle = isCurrent ? "#fbbf24" : "rgba(255,255,255,0.92)";
          ctx.fill();
          const label = tierAbbr(M.tiers[point.t].name);
          ctx.lineWidth = 3 / t.k;
          ctx.strokeStyle = "rgba(5, 7, 17, 0.85)";
          ctx.strokeText(label, point.x, point.y - 11 / t.k);
          ctx.fillStyle = "#fde68a";
          ctx.fillText(label, point.x, point.y - 11 / t.k);
        }
      }

      /* ============================== all-time rendering ============================== */

      function drawAll() {
        const t = tf();
        const at = buildAllTime();
        ctx.save();
        ctx.translate(t.x, t.y);
        ctx.scale(t.k, t.k);

        // guild hulls sized by loyalist core
        for (const [g] of at.roster) {
          const r = hullRadius(allTimeHullN(at, g));
          const guild = M.guilds[g];
          const isSel = g === view.selGuild;
          const isHover = view.hover && view.hover.kind === "guild" && view.hover.g === g;
          ctx.beginPath();
          ctx.arc(at.gx[g], at.gy[g], r, 0, Math.PI * 2);
          ctx.fillStyle = `hsl(${guild.hue} 65% 58% / ${isSel || isHover ? 0.16 : 0.07})`;
          ctx.fill();
          if (isSel || isHover) {
            ctx.lineWidth = 1.6 / t.k;
            ctx.strokeStyle = `hsl(${guild.hue} 70% 65% / 0.8)`;
            ctx.stroke();
          }
        }

        // career fibers: every multi-guild character tethered to each of their guilds
        if (view.showFibers && at.fibers.length) {
          for (let i = 0; i < at.fibers.length; i += 3) {
            const s = at.fibers[i];
            const g = at.fibers[i + 1];
            const reports = at.fibers[i + 2];
            const isSel = view.selGuild === g || view.selChar === at.c[s];
            ctx.beginPath();
            ctx.moveTo(at.x[s], at.y[s]);
            ctx.lineTo(at.gx[g], at.gy[g]);
            ctx.strokeStyle = isSel ? "rgba(251, 191, 36, 0.45)" : "rgba(148, 163, 184, 0.055)";
            ctx.lineWidth = (isSel ? 0.9 : 0.45) / t.k + Math.min(2.4, Math.sqrt(reports) * 0.08) / Math.sqrt(t.k);
            ctx.stroke();
          }
        }

        // membership mask so a selected guild keeps ALL its members lit, including
        // multi-guild characters whose primary guild is elsewhere
        let mask = null;
        if (view.selGuild >= 0) {
          if (at.selMaskG !== view.selGuild) {
            const m = new Uint8Array(at.count);
            for (let s = 0; s < at.count; s += 1) {
              const mem = M.chars[at.c[s]].mem;
              for (let i = 0; i < mem.length; i += 3) {
                if (mem[i + 1] === view.selGuild && mem[i + 2] >= view.minReports) { m[s] = 1; break; }
              }
            }
            at.selMask = m;
            at.selMaskG = view.selGuild;
          }
          mask = at.selMask;
        }

        // dots
        const buckets = new Map();
        for (let s = 0; s < at.count; s += 1) {
          const cls = M.chars[at.c[s]].classID;
          let alpha = 0.92;
          if (view.classFilter.size && !view.classFilter.has(cls)) alpha *= 0.1;
          if (mask && !mask[s]) alpha *= 0.22;
          if (view.selChar >= 0) alpha *= at.c[s] === view.selChar ? 1 : 0.1;
          if (alpha < 0.02) continue;
          const bucket = cls * 16 + Math.min(15, Math.round(alpha * 10));
          let path = buckets.get(bucket);
          if (!path) buckets.set(bucket, (path = new Path2D()));
          const r = 1.7 + Math.min(2.4, Math.sqrt(at.rep[s]) * 0.28);
          path.moveTo(at.x[s] + r, at.y[s]);
          path.arc(at.x[s], at.y[s], r, 0, Math.PI * 2);
        }
        for (const [bucket, path] of buckets) {
          ctx.globalAlpha = (bucket % 16) / 10;
          ctx.fillStyle = CLASS_COLORS[Math.floor(bucket / 16)];
          ctx.fill(path);
        }
        ctx.globalAlpha = 1;

        // selected character: amber tethers to every guild of their career
        if (view.selChar >= 0) {
          const s = at.slotOf.get(view.selChar);
          if (s !== undefined) {
            const mem = M.chars[view.selChar].mem;
            const seen = new Set();
            ctx.lineWidth = 1.8 / Math.sqrt(t.k);
            ctx.strokeStyle = "rgba(251, 191, 36, 0.85)";
            for (let i = 0; i < mem.length; i += 3) {
              const g = mem[i + 1];
              if (mem[i + 2] < view.minReports || seen.has(g)) continue;
              seen.add(g);
              ctx.beginPath();
              ctx.moveTo(at.x[s], at.y[s]);
              ctx.lineTo(at.gx[g], at.gy[g]);
              ctx.stroke();
            }
            ctx.beginPath();
            ctx.arc(at.x[s], at.y[s], 6 / Math.sqrt(t.k), 0, Math.PI * 2);
            ctx.strokeStyle = "#fbbf24";
            ctx.lineWidth = 2 / Math.sqrt(t.k);
            ctx.stroke();
          }
        }

        // hovered character ring
        if (view.hover && view.hover.kind === "char") {
          const s = view.hover.s;
          ctx.beginPath();
          ctx.arc(at.x[s], at.y[s], 5, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(255,255,255,0.9)";
          ctx.lineWidth = 1.4 / t.k;
          ctx.stroke();
        }

        if (view.showLabels) drawAllGuildLabels(t, at);
        drawCharLabels(t, at, 4.2);

        ctx.restore();
      }

      function hitAll(px, py) {
        const at = buildAllTime();
        const world = toWorld(px, py);
        const { cell, grid } = buildGrid(at);
        const reach = Math.max(6, 8 / tf().k);
        let best = null;
        let bestD = reach;
        const cx = Math.floor(world.x / cell);
        const cy = Math.floor(world.y / cell);
        for (let ix = cx - 1; ix <= cx + 1; ix += 1) {
          for (let iy = cy - 1; iy <= cy + 1; iy += 1) {
            const list = grid.get(`${ix}:${iy}`);
            if (!list) continue;
            for (const s of list) {
              const d = Math.hypot(world.x - at.x[s], world.y - at.y[s]);
              if (d < bestD) { bestD = d; best = s; }
            }
          }
        }
        if (best !== null) return { kind: "char", s: best, c: at.c[best], g: at.g[best] };

        let bestG = null;
        let bestGD = Infinity;
        for (const [g] of at.roster) {
          const d = Math.hypot(world.x - at.gx[g], world.y - at.gy[g]);
          if (d < hullRadius(allTimeHullN(at, g)) && d < bestGD) { bestGD = d; bestG = g; }
        }
        if (bestG !== null) return { kind: "guild", g: bestG };
        return null;
      }

      /* ============================== alluvial rendering ============================== */

      function flowColor(f, highlight) {
        if (highlight) return "rgba(251, 191, 36, 0.72)";
        if (f.a === f.b && f.a !== LUMP) {
          return `hsl(${M.guilds[f.a].hue} 60% 55% / 0.4)`;
        }
        if (f.a === f.b) return "rgba(148, 163, 184, 0.16)";
        return "rgba(148, 163, 184, 0.17)";
      }

      function drawFlow() {
        const t = tf();
        const { columns, flows } = F.alluvial;
        ctx.save();
        ctx.translate(t.x, t.y);
        ctx.scale(t.k, t.k);

        const selG = view.selGuild;
        const hover = view.hover;
        const selTiers = view.selChar >= 0 ? F.charTiers[view.selChar] || [] : [];

        // ribbons
        for (let i = 1; i < columns.length; i += 1) {
          if (!flows[i]) continue;
          const x0 = (i - 1) * ALLUVIAL_COL_PITCH + ALLUVIAL_NODE_W;
          const x1 = i * ALLUVIAL_COL_PITCH;
          const cpx = (x1 - x0) * 0.45;
          for (const f of flows[i]) {
            const isSel = selG >= 0 && (f.a === selG || f.b === selG);
            const isHover = hover && hover.kind === "flow" && hover.f === f;
            ctx.beginPath();
            ctx.moveTo(x0, f.ya);
            ctx.bezierCurveTo(x0 + cpx, f.ya, x1 - cpx, f.yb, x1, f.yb);
            ctx.lineTo(x1, f.yb + f.w);
            ctx.bezierCurveTo(x1 - cpx, f.yb + f.w, x0 + cpx, f.ya + f.w, x0, f.ya + f.w);
            ctx.closePath();
            ctx.fillStyle = flowColor(f, isSel || isHover);
            ctx.fill();
          }
        }

        // nodes
        for (let i = 0; i < columns.length; i += 1) {
          const isCurrentTier = i === view.tier;
          for (const node of columns[i].nodes) {
            const isSel = node.g === selG;
            const isHover = hover && hover.kind === "node" && hover.node === node;
            const hue = node.g === LUMP ? null : M.guilds[node.g].hue;
            ctx.fillStyle = node.g === LUMP
              ? "rgba(115, 129, 150, 0.55)"
              : `hsl(${hue} 62% ${isSel || isHover ? 66 : 52}% / ${isSel || isHover ? 1 : 0.85})`;
            ctx.fillRect(node.x, node.y, ALLUVIAL_NODE_W, node.h);
            if (isSel) {
              ctx.lineWidth = 1.6 / t.k;
              ctx.strokeStyle = "#fbbf24";
              ctx.strokeRect(node.x, node.y, ALLUVIAL_NODE_W, node.h);
            }
            const apparentH = node.h * t.k;
            if ((apparentH > 9 || isSel || isHover) && node.g !== LUMP) {
              const fontPx = clamp(10.5 / t.k, 2.5, 80);
              ctx.font = `650 ${fontPx}px Inter, system-ui, sans-serif`;
              ctx.textAlign = "left";
              ctx.textBaseline = "middle";
              const label = M.guilds[node.g].name;
              ctx.lineWidth = 3 / t.k;
              ctx.strokeStyle = "rgba(5, 7, 17, 0.8)";
              ctx.strokeText(label, node.x + ALLUVIAL_NODE_W + 4 / t.k, node.y + node.h / 2);
              ctx.fillStyle = isSel || isHover ? "#fbbf24" : `hsl(${hue} 60% 78% / 0.9)`;
              ctx.fillText(label, node.x + ALLUVIAL_NODE_W + 4 / t.k, node.y + node.h / 2);
            }
          }
          // column header
          const tier = M.tiers[i];
          const fontPx = clamp(12 / t.k, 3, 90);
          ctx.font = `800 ${fontPx}px Inter, system-ui, sans-serif`;
          ctx.textAlign = "left";
          ctx.textBaseline = "bottom";
          const hx = i * ALLUVIAL_COL_PITCH;
          const hy = -18 / t.k;
          ctx.fillStyle = isCurrentTier ? "#fbbf24" : expColor(tier.expansion);
          ctx.fillText(tierAbbr(tier.name), hx, hy);
          ctx.font = `600 ${fontPx * 0.72}px Inter, system-ui, sans-serif`;
          ctx.fillStyle = "rgba(165, 180, 200, 0.75)";
          ctx.fillText(tier.start ? String(new Date(tier.start).getFullYear()) : "", hx, hy + fontPx * 0.85);
        }

        // selected character path across columns
        if (view.selChar >= 0 && selTiers.length) {
          ctx.beginPath();
          let started = false;
          for (const tt of selTiers) {
            const td = F.tiers[tt];
            const s = td.slotOf.get(view.selChar);
            const g = td.g[s];
            const node = columns[tt].byG.get((td.roster.get(g) || 0) >= ALLUVIAL_MIN_ROSTER ? g : LUMP);
            if (!node) continue;
            const x = node.x + ALLUVIAL_NODE_W / 2;
            const y = node.y + node.h / 2;
            if (started) ctx.lineTo(x, y); else { ctx.moveTo(x, y); started = true; }
          }
          ctx.strokeStyle = "rgba(251, 191, 36, 0.9)";
          ctx.lineWidth = 2.4 / t.k;
          ctx.stroke();
        }

        ctx.restore();
      }

      /* ============================== frame loop ============================== */

      function frame(now) {
        const rect = stage.getBoundingClientRect();
        const ratio = window.devicePixelRatio || 1;
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        ctx.clearRect(0, 0, rect.width, rect.height);
        if (F.tiers) {
          if (view.mode === "galaxy") drawGalaxy(now);
          else if (view.mode === "all") drawAll();
          else drawFlow();
        }
        requestAnimationFrame(frame);
      }

      /* ============================== hit testing ============================== */

      function buildGrid(td) {
        if (td.grid) return td.grid;
        const cell = 22;
        const grid = new Map();
        for (let s = 0; s < td.count; s += 1) {
          const key = `${Math.floor(td.x[s] / cell)}:${Math.floor(td.y[s] / cell)}`;
          let list = grid.get(key);
          if (!list) grid.set(key, (list = []));
          list.push(s);
        }
        td.grid = { cell, grid };
        return td.grid;
      }

      function hitGalaxy(px, py) {
        const world = toWorld(px, py);
        const td = F.tiers[view.tier];
        const { cell, grid } = buildGrid(td);
        const reach = Math.max(6, 8 / tf().k);
        let best = null;
        let bestD = reach;
        const cx = Math.floor(world.x / cell);
        const cy = Math.floor(world.y / cell);
        for (let ix = cx - 1; ix <= cx + 1; ix += 1) {
          for (let iy = cy - 1; iy <= cy + 1; iy += 1) {
            const list = grid.get(`${ix}:${iy}`);
            if (!list) continue;
            for (const s of list) {
              const d = Math.hypot(world.x - td.x[s], world.y - td.y[s]);
              if (d < bestD) { bestD = d; best = s; }
            }
          }
        }
        if (best !== null) return { kind: "char", s: best, c: td.c[best], g: td.g[best] };

        let bestG = null;
        let bestGD = Infinity;
        for (const [g, n] of td.roster) {
          const d = Math.hypot(world.x - F.gx[g], world.y - F.gy[g]);
          if (d < hullRadius(n) && d < bestGD) { bestGD = d; bestG = g; }
        }
        if (bestG !== null) return { kind: "guild", g: bestG };
        if (view.tier > 0) {
          const prev = F.tiers[view.tier - 1];
          for (const [g, n] of prev.roster) {
            if (td.roster.has(g)) continue;
            const d = Math.hypot(world.x - F.gx[g], world.y - F.gy[g]);
            if (d < hullRadius(n) && d < bestGD) { bestGD = d; bestG = g; }
          }
          if (bestG !== null) return { kind: "guild", g: bestG, previous: true };
        }
        return null;
      }

      function hitFlow(px, py) {
        const world = toWorld(px, py);
        const { columns, flows } = F.alluvial;
        const col = Math.round(world.x / ALLUVIAL_COL_PITCH);

        // headers
        if (world.y < -6 && col >= 0 && col < columns.length && Math.abs(world.x - col * ALLUVIAL_COL_PITCH) < 90) {
          return { kind: "header", t: col };
        }

        // nodes
        const colIdx = Math.floor((world.x + 40) / ALLUVIAL_COL_PITCH);
        for (const i of [colIdx, colIdx + 1]) {
          if (i < 0 || i >= columns.length) continue;
          if (world.x >= i * ALLUVIAL_COL_PITCH - 2 && world.x <= i * ALLUVIAL_COL_PITCH + ALLUVIAL_NODE_W + 2) {
            for (const node of columns[i].nodes) {
              if (world.y >= node.y - 1 && world.y <= node.y + node.h + 1) return { kind: "node", node, t: i };
            }
          }
        }

        // ribbons
        const gap = Math.ceil(world.x / ALLUVIAL_COL_PITCH);
        if (gap >= 1 && gap < columns.length && flows[gap]) {
          const x0 = (gap - 1) * ALLUVIAL_COL_PITCH + ALLUVIAL_NODE_W;
          const x1 = gap * ALLUVIAL_COL_PITCH;
          if (world.x > x0 && world.x < x1) {
            const u = (world.x - x0) / (x1 - x0);
            const su = u * u * (3 - 2 * u);
            let best = null;
            for (const f of flows[gap]) {
              const yTop = f.ya + (f.yb - f.ya) * su;
              if (world.y >= yTop - 1 && world.y <= yTop + f.w + 1) {
                if (!best || f.w < best.w) best = f;
              }
            }
            if (best) return { kind: "flow", f: best, t: gap };
          }
        }
        return null;
      }

      /* ============================== tooltip ============================== */

      function showTooltip(px, py, html) {
        tooltip.innerHTML = html;
        tooltip.style.display = "block";
        const rect = stage.getBoundingClientRect();
        const tw = tooltip.offsetWidth;
        const th = tooltip.offsetHeight;
        tooltip.style.left = `${clamp(px + 16, 4, rect.width - tw - 6)}px`;
        tooltip.style.top = `${clamp(py + 14, 4, rect.height - th - 6)}px`;
      }

      function hideTooltip() {
        tooltip.style.display = "none";
      }

      function flowNames(f, max = 8) {
        const names = (f.cs || []).slice(0, max).map((c) => characterLabel(c)).join(", ");
        if (!names) return "";
        const extra = f.n - Math.min(f.cs.length, max);
        return `<br><span style="color:#cbd5e1">${esc(names)}${extra > 0 ? ` +${fmt(extra)} more` : ""}</span>`;
      }

      function tooltipFor(hit) {
        if (hit.kind === "char") {
          const ch = M.chars[hit.c];
          const tiersAttended = (F.charTiers[hit.c] || []).length;
          if (view.mode === "all") {
            const at = F.allTime;
            return `<b style="color:${CLASS_COLORS[ch.classID]}">${esc(characterLabel(hit.c))}</b><br>
              ${esc(CLASS_NAMES[ch.classID] || "Unknown")} · main guild ${esc(guildLabel(hit.g))}<br>
              ${fmt(at.rep[hit.s])} reports across ${fmt(at.guildN[hit.s])} ${at.guildN[hit.s] === 1 ? "guild" : "guilds"} · ${tiersAttended} tiers · click for career`;
          }
          const td = F.tiers[view.tier];
          const reports = td.r[hit.s];
          return `<b style="color:${CLASS_COLORS[ch.classID]}">${esc(characterLabel(hit.c))}</b><br>
            ${esc(CLASS_NAMES[ch.classID] || "Unknown")} · ${esc(guildLabel(hit.g))}<br>
            ${fmt(reports)} reports this tier · ${tiersAttended} tiers tracked · click for career`;
        }
        if (hit.kind === "guild") {
          if (view.mode === "all") {
            const at = F.allTime;
            return `<b>${esc(guildLabel(hit.g))}</b><br>${fmt(at.roster.get(hit.g) || 0)} distinct members all time · click to inspect`;
          }
          const n = F.tiers[view.tier].roster.get(hit.g) || 0;
          if (!n && hit.previous && view.tier > 0) {
            const prev = F.tiers[view.tier - 1];
            const prevN = prev.roster.get(hit.g) || 0;
            return `<b>${esc(guildLabel(hit.g))}</b><br>${fmt(prevN)} raiders in previous tier · click to inspect`;
          }
          return `<b>${esc(guildLabel(hit.g))}</b><br>${fmt(n)} raiders this tier · click to inspect`;
        }
        if (hit.kind === "node") {
          return `<b>${esc(guildLabel(hit.node.g))}</b><br>${fmt(hit.node.count)} raiders in ${esc(M.tiers[hit.t].name)}`;
        }
        if (hit.kind === "flow") {
          const f = hit.f;
          const from = M.tiers[hit.t - 1];
          const to = M.tiers[hit.t];
          if (f.a === f.b) {
            return `<b>${esc(guildLabel(f.a))}</b><br>${fmt(f.n)} raiders stayed from ${esc(tierAbbr(from.name))} to ${esc(tierAbbr(to.name))}${flowNames(f)}`;
          }
          return `<b>${esc(guildLabel(f.a))} → ${esc(guildLabel(f.b))}</b><br>${fmt(f.n)} raiders moved between ${esc(tierAbbr(from.name))} and ${esc(tierAbbr(to.name))}${flowNames(f)}`;
        }
        if (hit.kind === "header") {
          return `<b>${esc(M.tiers[hit.t].name)}</b><br>${esc(M.tiers[hit.t].expansion)} · click to set current tier`;
        }
        return "";
      }

      /* ============================== pointer interactions ============================== */

      const pointer = { down: false, moved: false, x: 0, y: 0 };

      canvas.addEventListener("pointerdown", (event) => {
        const rect = canvas.getBoundingClientRect();
        pointer.down = true;
        pointer.moved = false;
        pointer.x = event.clientX - rect.left;
        pointer.y = event.clientY - rect.top;
        canvas.setPointerCapture(event.pointerId);
      });

      canvas.addEventListener("pointermove", (event) => {
        const rect = canvas.getBoundingClientRect();
        const px = event.clientX - rect.left;
        const py = event.clientY - rect.top;
        if (pointer.down) {
          const dx = px - pointer.x;
          const dy = py - pointer.y;
          if (Math.abs(dx) + Math.abs(dy) > 3) pointer.moved = true;
          if (pointer.moved) {
            tf().x += dx;
            tf().y += dy;
            hideTooltip();
          }
          pointer.x = px;
          pointer.y = py;
          return;
        }
        if (!F.tiers) return;
        const hit = view.mode === "galaxy" ? hitGalaxy(px, py) : view.mode === "all" ? hitAll(px, py) : hitFlow(px, py);
        view.hover = hit;
        canvas.style.cursor = hit ? "pointer" : "default";
        if (hit) showTooltip(px, py, tooltipFor(hit));
        else hideTooltip();
      });

      canvas.addEventListener("pointerup", (event) => {
        const wasDrag = pointer.moved;
        pointer.down = false;
        try { canvas.releasePointerCapture(event.pointerId); } catch {}
        if (wasDrag || !F.tiers) return;

        const rect = canvas.getBoundingClientRect();
        const px = event.clientX - rect.left;
        const py = event.clientY - rect.top;
        const hit = view.mode === "galaxy" ? hitGalaxy(px, py) : view.mode === "all" ? hitAll(px, py) : hitFlow(px, py);
        if (!hit) { clearSelection(); return; }
        if (hit.kind === "char") selectChar(hit.c);
        else if (hit.kind === "guild") selectGuild(hit.g);
        else if (hit.kind === "node") selectGuild(hit.node.g);
        else if (hit.kind === "header") { stopPlay(); setTier(hit.t, false); }
        else if (hit.kind === "flow" && hit.f.a !== LUMP) selectGuild(hit.f.a === hit.f.b ? hit.f.a : hit.f.b);
      });

      canvas.addEventListener("wheel", (event) => {
        event.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const px = event.clientX - rect.left;
        const py = event.clientY - rect.top;
        const t = tf();
        const before = toWorld(px, py);
        const factor = event.deltaY > 0 ? 0.88 : 1.14;
        t.k = clamp(t.k * factor, 0.015, 6);
        t.x = px - before.x * t.k;
        t.y = py - before.y * t.k;
        hideTooltip();
      }, { passive: false });

      /* ============================== top-level events ============================== */

      function setMode(mode) {
        view.mode = mode;
        els.modeGalaxy.classList.toggle("active", mode === "galaxy");
        els.modeAll.classList.toggle("active", mode === "all");
        els.modeFlow.classList.toggle("active", mode === "flow");
        els.timeline.classList.toggle("dimmed", mode === "all");
        if (mode === "flow" && !view.fitted.flow) fitFlow();
        if (mode === "all" && !view.fitted.all) fitAll();
        if (mode === "galaxy" && !view.fitted.galaxy) fitGalaxy();
        view.hover = null;
        hideTooltip();
        updateHud();
        renderInspector();
      }

      els.modeGalaxy.addEventListener("click", () => setMode("galaxy"));
      els.modeAll.addEventListener("click", () => setMode("all"));
      els.modeFlow.addEventListener("click", () => setMode("flow"));

      els.minReports.addEventListener("change", () => {
        view.minReports = Number(els.minReports.value);
        els.loadingText.textContent = "Recomputing constellation…";
        els.loading.classList.add("visible");
        setTimeout(() => {
          rebuild();
          view.fitted.galaxy = false;
          view.fitted.all = false;
          view.fitted.flow = false;
          if (view.mode === "galaxy") fitGalaxy();
          else if (view.mode === "all") fitAll();
          else fitFlow();
          els.loading.classList.remove("visible");
          updateHud();
          renderInspector();
        }, 30);
      });

      els.tglFlows.addEventListener("change", () => { view.showFlows = els.tglFlows.checked; });
      els.tglTrails.addEventListener("change", () => { view.showTrails = els.tglTrails.checked; });
      els.tglFibers.addEventListener("change", () => { view.showFibers = els.tglFibers.checked; });
      els.tglLabels.addEventListener("change", () => { view.showLabels = els.tglLabels.checked; });

      els.search.addEventListener("input", () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(runSearch, 160);
      });

      els.resetView.addEventListener("click", () => {
        if (view.mode === "galaxy") fitGalaxy();
        else if (view.mode === "all") fitAll();
        else fitFlow();
      });
      els.clearSel.addEventListener("click", clearSelection);
      els.playBtn.addEventListener("click", () => {
        if (view.playing) stopPlay();
        else startPlay();
      });

      window.addEventListener("keydown", (event) => {
        if (event.target instanceof HTMLInputElement || event.target instanceof HTMLSelectElement) return;
        if (event.key === "ArrowRight") { stopPlay(); setTier(view.tier + 1); }
        else if (event.key === "ArrowLeft") { stopPlay(); setTier(view.tier - 1); }
        else if (event.key === " ") { event.preventDefault(); view.playing ? stopPlay() : startPlay(); }
        else if (event.key === "Escape") clearSelection();
      });

      window.addEventListener("resize", resizeCanvas);
      if ("ResizeObserver" in window) new ResizeObserver(resizeCanvas).observe(stage);

      resizeCanvas();
      boot();
    </script>
  </body>
</html>
